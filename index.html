<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SufiSigma | Calisthenics Guide</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111;
  --bg3: #181818;
  --accent: #d4af37; /* GOLD */
  --accent2: #ff4d00;
  --text: #f0f0f0;
  --muted: #888;
  --border: #2a2a2a;
}

* {margin:0;padding:0;box-sizing:border-box;}
body {background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}

nav {
  position:fixed;top:0;width:100%;
  display:flex;justify-content:space-between;
  padding:1rem 2rem;
  background:rgba(0,0,0,0.9);
  border-bottom:1px solid var(--border);
}
.nav-logo {
  font-family:'Bebas Neue';
  letter-spacing:3px;
  color:var(--accent);
}
.nav-links {display:flex;gap:1.5rem;}
.nav-links a {
  color:var(--muted);
  text-decoration:none;
  font-size:0.8rem;
}
.nav-links a:hover {color:var(--accent);}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  padding:6rem 2rem;
  position:relative;
}
.hero-bg {
  position:absolute;inset:0;
  background:radial-gradient(circle at 70% 50%, rgba(212,175,55,0.1), transparent);
}
.hero-content {max-width:1200px;margin:auto;}

.hero-title {
  font-family:'Bebas Neue';
  font-size:clamp(4rem,10vw,9rem);
  line-height:0.9;
  text-shadow:0 0 20px rgba(212,175,55,0.2);
}
.main-word {
  color:var(--accent);
  letter-spacing:6px;
}

.hero-subtitle {
  margin-top:1rem;
  color:var(--muted);
}

.hero-cta {
  display:inline-block;
  margin-top:2rem;
  padding:1rem 2rem;
  background:var(--accent);
  color:#000;
  border-radius:30px;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 0 20px rgba(212,175,55,0.3);
}
.hero-cta:hover {
  box-shadow:0 0 30px rgba(212,175,55,0.6);
}

.hero-quote {
  margin-top:1rem;
  font-size:0.8rem;
  letter-spacing:3px;
  color:var(--muted);
}

/* SECTION */
section {padding:5rem 2rem;}
.section-title {
  font-family:'Bebas Neue';
  font-size:3rem;
  margin-bottom:2rem;
}

/* CARDS */
.exercise-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:1.5rem;
}

.exercise-card {
  background:rgba(255,255,255,0.02);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  padding:1.5rem;
  transition:0.3s;
}
.exercise-card:hover {
  transform:translateY(-5px) scale(1.02);
  border-color:var(--accent);
}

.card-title {
  font-family:'Barlow Condensed';
  font-size:1.3rem;
}

.card-desc {
  font-size:0.9rem;
  color:var(--muted);
  margin-top:0.5rem;
}

/* SCROLLBAR */
::-webkit-scrollbar {width:4px;}
::-webkit-scrollbar-thumb {
  background:linear-gradient(#d4af37,#ff4d00);
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">SufiSigma</div>
  <div class="nav-links">
    <a href="#">Exercises</a>
    <a href="#">Plans</a>
    <a href="#">Tips</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    
    <h1 class="hero-title">
      <span class="main-word">CALISTHENICS</span><br>
      GUIDE
    </h1>

    <p class="hero-subtitle">
      Master your body. No gym required.
    </p>

    <p class="hero-quote">
      NO GYM. ONLY DISCIPLINE.
    </p>

    <a href="#" class="hero-cta">START TRAINING</a>

  </div>
</section>

<section>
  <h2 class="section-title">EXERCISES</h2>

  <div class="exercise-grid">

    <div class="exercise-card">
      <div class="card-title">Push Up</div>
      <div class="card-desc">Basic strength builder.</div>
    </div>

    <div class="exercise-card">
      <div class="card-title">Pull Up</div>
      <div class="card-desc">Back ka king exercise.</div>
    </div>

    <div class="exercise-card">
      <div class="card-title">Dips</div>
      <div class="card-desc">Chest + triceps killer.</div>
    </div>

  </div>
</section>

</body>
</html>
